<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>{% block title %}Flask WTF{% endblock %}</title>
    
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=True) %}
    {% if messages %}
        {% for category,msg in messages %}
        <p style="color: green;">{{msg}}</p>
        {% endfor %}
    {% endif %}
    {% endwith %}
    

    
</body>
</html>
